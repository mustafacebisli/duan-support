      { h: '5. Контент', p: 'Приложение предоставляет контент: текст Корана, переводы, аудио, время намаза, направление киблы и счётчик тасбиха. Этот контент носит исключительно информационный характер и не заменяет профессиональную религиозную консультацию.' },

      { h: '7. Ограничение ответственности', p: 'Приложение предоставляется «как есть». Мы не несём ответственности за прямой или косвенный ущерб от использования Приложения. Информация о времени намаза и направлении киблы основана на данных о местоположении, точность не гарантируется.' },
      { h: '8. Прекращение', p: 'Несоблюдение этих условий приведёт к автоматическому прекращению вашей лицензии. При прекращении вы должны удалить все копии Приложения.' },
      { h: '9. Изменения', p: 'Эти условия использования могут периодически обновляться. Обновлённые условия будут опубликованы на этой странице. Продолжение использования Приложения означает принятие действующих условий.' },

  bn: {

    title: 'ব্যবহারের শর্তাবলী (EULA)',
    date: 'সর্বশেষ আপডেট: ২ মার্চ ২০২৬',
    sections: [
      { h: '১. গ্রহণ', p: 'এই শেষ ব্যবহারকারী লাইসেন্স চুক্তি ("EULA") আপনার এবং Duan – আপনার আধ্যাত্মিক সঙ্গী ("অ্যাপ") এর মধ্যে একটি আইনি চুক্তি। অ্যাপটি ডাউনলোড, ইনস্টল বা ব্যবহার করে আপনি এই শর্তাবলীতে সম্মত হচ্ছেন।' },
      { h: '২. লাইসেন্স', p: 'আপনাকে ব্যক্তিগত, অ-বাণিজ্যিক ব্যবহারের জন্য সীমিত, অ-একচেটিয়া, অ-হস্তান্তরযোগ্য এবং প্রত্যাহারযোগ্য লাইসেন্স দেওয়া হচ্ছে। এই লাইসেন্স আপনাকে আপনার মালিকানাধীন বা নিয়ন্ত্রিত Apple ডিভাইসে অ্যাপটি ব্যবহার করতে দেয়।' },
      { h: '৩. বিধিনিষেধ', p: 'নিম্নলিখিত কাজগুলি নিষিদ্ধ:', list: ['অ্যাপটি কপি, পরিবর্তন বা বিতরণ করা','অ্যাপটির রিভার্স ইঞ্জিনিয়ারিং, ডিকম্পাইল বা ডিসঅ্যাসেম্বল করা','অবৈধ উদ্দেশ্যে অ্যাপটি ব্যবহার করা','অ্যাপের কোনো অংশ তৃতীয় পক্ষকে লাইসেন্স, সাবলাইসেন্স, বিক্রি বা হস্তান্তর করা'] },
      { h: '৪. সাবস্ক্রিপশন ও পেমেন্ট', p: 'অ্যাপটি প্রিমিয়াম ফিচারের জন্য স্বয়ংক্রিয়-নবায়ন সাবস্ক্রিপশন অফার করে:', list: ['<strong>মাসিক সাবস্ক্রিপশন:</strong> প্রতি মাসে স্বয়ংক্রিয়ভাবে নবায়ন হয়।','<strong>বার্ষিক সাবস্ক্রিপশন:</strong> প্রতি বছর স্বয়ংক্রিয়ভাবে নবায়ন হয়।'], p2: 'ক্রয় নিশ্চিত হলে আপনার Apple ID অ্যাকাউন্ট থেকে পেমেন্ট নেওয়া হবে। বর্তমান সময়ের শেষের অন্তত ২৪ ঘণ্টা আগে বাতিল না করলে সাবস্ক্রিপশন একই মূল্যে স্বয়ংক্রিয়ভাবে নবায়ন হবে।', p3: 'ক্রয়ের পরে Apple ID অ্যাকাউন্ট সেটিংস থেকে আপনার সাবস্ক্রিপশন পরিচালনা ও বাতিল করতে পারেন। বিনামূল্যে ট্রায়াল পিরিয়ডের অব্যবহৃত অংশ সাবস্ক্রিপশন কেনার সময় বাতিল হয়ে যাবে।' },
      { h: '৫. বিষয়বস্তু', p: 'অ্যাপটি কুরআনের টেক্সট, অনুবাদ, অডিও, নামাজের সময়, কিবলা দিকনির্দেশ এবং তাসবিহ কাউন্টার সরবরাহ করে। এই বিষয়বস্তু শুধুমাত্র তথ্যমূলক এবং পেশাদার ধর্মীয় পরামর্শের বিকল্প নয়।' },
      { h: '৬. মেধা সম্পত্তি', p: 'অ্যাপ এবং এর সমস্ত বিষয়বস্তু (ডিজাইন, কোড, গ্রাফিক্স, আইকন) কপিরাইট এবং অন্যান্য মেধা সম্পত্তি আইন দ্বারা সুরক্ষিত। সর্বস্বত্ব সংরক্ষিত।' },
      { h: '৭. দায়বদ্ধতার সীমাবদ্ধতা', p: 'অ্যাপটি "যেমন আছে" ভিত্তিতে সরবরাহ করা হয়। অ্যাপ ব্যবহার থেকে উদ্ভূত প্রত্যক্ষ বা পরোক্ষ ক্ষতির জন্য আমরা দায়ী নই। নামাজের সময় এবং কিবলা দিকনির্দেশের মতো তথ্য লোকেশন ডেটার উপর ভিত্তি করে এবং নির্ভুলতা নিশ্চিত নয়।' },
      { h: '৮. সমাপ্তি', p: 'এই শর্তাবলী মেনে না চললে আপনার লাইসেন্স স্বয়ংক্রিয়ভাবে বাতিল হবে। সমাপ্তির পরে অ্যাপের সমস্ত কপি মুছে ফেলতে হবে।' },
      { h: '৯. পরিবর্তন', p: 'এই ব্যবহারের শর্তাবলী সময়ে সময়ে আপডেট হতে পারে। আপডেট করা শর্তাবলী এই পৃষ্ঠায় প্রকাশিত হবে। অ্যাপের ক্রমাগত ব্যবহার বর্তমান শর্তাবলীর গ্রহণ গঠন করে।' },
      { h: '১০. তৃতীয় পক্ষের সেবা', p: 'অ্যাপটি নিম্নলিখিত তৃতীয় পক্ষের পরিষেবা ব্যবহার করে। তাদের নিজস্ব ব্যবহারের শর্তাবলী প্রযোজ্য:', list: ['<strong>Firebase (Google):</strong> ডেটা সিঙ্ক্রোনাইজেশন এবং অ্যানালিটিক্স','<strong>RevenueCat:</strong> সাবস্ক্রিপশন ম্যানেজমেন্ট'] },
      { h: '১১. যোগাযোগ', p: 'এই ব্যবহারের শর্তাবলী সম্পর্কে প্রশ্নের জন্য:', email: true }

function detectLang() {
  var nav = (navigator.language || navigator.userLanguage || 'en').toLowerCase().split('-')[0];
  return i18n[nav] ? nav : 'en';
}

function render(lang) {
  var t = i18n[lang];
  document.documentElement.lang = lang;
  document.documentElement.dir = t.dir;
  document.getElementById('langSelect').value = lang;
  document.title = 'Duan – ' + t.title;

  var html = '<a href="index.html" class="back">' + t.back + '</a>';
  html += '<h1>' + t.title + '</h1>';
  html += '<p class="date">' + t.date + '</p>';

  for (var i = 0; i < t.sections.length; i++) {
    var s = t.sections[i];
    html += '<div class="section"><h2>' + s.h + '</h2><p>' + s.p + '</p>';
    if (s.list) {
      html += '<ul>';
      for (var j = 0; j < s.list.length; j++) html += '<li>' + s.list[j] + '</li>';
      html += '</ul>';
    }
    if (s.p2) html += '<p>' + s.p2 + '</p>';
    if (s.p3) html += '<p>' + s.p3 + '</p>';
    if (s.email) html += '<p><a href="mailto:mustafacebisli@gmail.com">mustafacebisli@gmail.com</a></p>';
    html += '</div>';
  }
  document.getElementById('content').innerHTML = html;
  document.getElementById('footer').textContent = t.footer;
}

function setLang(lang) {
  render(lang);
  try { localStorage.setItem('duan_lang', lang); } catch(e) {}
}

(function() {
  var saved;
  try { saved = localStorage.getItem('duan_lang'); } catch(e) {}
  render(saved && i18n[saved] ? saved : detectLang());
})();
