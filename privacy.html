function detectLang() {
  var nav = (navigator.language || navigator.userLanguage || 'en').toLowerCase().split('-')[0];
  return i18n[nav] ? nav : 'en';
}

function render(lang) {
  var t = i18n[lang];
  document.documentElement.lang = lang;
  document.documentElement.dir = t.dir;
  document.getElementById('langSelect').value = lang;
  document.title = 'Duan – ' + t.title;

  var html = '<a href="index.html" class="back">' + t.back + '</a>';
  html += '<h1>' + t.title + '</h1>';
  html += '<p class="date">' + t.date + '</p>';

  for (var i = 0; i < t.sections.length; i++) {
    var s = t.sections[i];
    html += '<div class="section"><h2>' + s.h + '</h2><p>' + s.p + '</p>';
    if (s.list) {
      html += '<ul>';
      for (var j = 0; j < s.list.length; j++) html += '<li>' + s.list[j] + '</li>';
      html += '</ul>';
    }
    if (s.p2) html += '<p>' + s.p2 + '</p>';
    if (s.p3) html += '<p>' + s.p3 + '</p>';
    if (s.email) html += '<p><a href="mailto:mustafacebisli@gmail.com">mustafacebisli@gmail.com</a></p>';
    html += '</div>';
  }
  document.getElementById('content').innerHTML = html;
  document.getElementById('footer').textContent = t.footer;
}

function setLang(lang) {
  render(lang);
  try { localStorage.setItem('duan_lang', lang); } catch(e) {}
}

(function() {
  var saved;
  try { saved = localStorage.getItem('duan_lang'); } catch(e) {}
  render(saved && i18n[saved] ? saved : detectLang());
})();
